services:
  # ── MinIO S3-compatible object storage ──
  minio:
    image: minio/minio:RELEASE.2025-06-20T04-31-41Z
    container_name: ar-minio
    ports:
      - "${MINIO_API_PORT:-9000}:9000"   # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # Web Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-anonymous_reporter}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data
    command: server /data --console-address :9001
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Bucket provisioning + lifecycle policy (one-shot) ──
  minio-init:
    image: minio/mc:latest
    container_name: ar-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: |
      /bin/sh -c '
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/$${MINIO_BUCKET:-reports};
      mc anonymous set private local/$${MINIO_BUCKET:-reports};
      mc ilm import local/$${MINIO_BUCKET:-reports} < /lifecycle.json;
      echo "[minio-init] Bucket + lifecycle policy configured.";
      '
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-anonymous_reporter}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_BUCKET: ${MINIO_BUCKET:-reports}
    volumes:
      - ./docker/minio-lifecycle.json:/lifecycle.json:ro

volumes:
  minio_data:
